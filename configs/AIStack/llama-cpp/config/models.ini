version = 1

[*]
parallel = 1
cont-batching = true
jinja = true
threads = 10
threads-batch = 10

# 
[default]
model = /models/Qwen3.5-9B-UD-Q4_K_XL.gguf

device = cuda0
split-mode = none
main-gpu = 0

ctx-size = 65536

n-gpu-layers = auto
fit = on
fit-target = 512

flash-attn = on
cache-type-k = q4_1
cache-type-v = q4_1

spec-type = draft-mtp

batch-size = 1024
ubatch-size = 256

load-on-startup = false
stop-timeout = 30

