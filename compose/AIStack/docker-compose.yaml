services:

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12
    container_name: llama-cpp
    restart: unless-stopped

    ports:
      - "8091:8080"

    volumes:
      - /mnt/HDDStorage/DockerVolumes/AIStack/Models:/models:ro
      - /opt/HomeLab/configs/AIStack/llama-cpp/config:/config:ro

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    command:
      [
        "--host", "0.0.0.0",
        "--port", "8080",

        "--models-preset", "/config/models.ini",
        "--models-max", "1",
        "--models-autoload",

        "--metrics"
      ]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "0"
                - "1"
              capabilities: [gpu]

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped

    ports:
      - "8082:8080"

    environment:
      - BASE_URL=http://localhost:8082/

    volumes:
      - /opt/HomeLab/configs/AIStack/searxng:/etc/searxng

  