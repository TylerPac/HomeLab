services:
  server:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped

    environment:

      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}

      # External SSH port shown in clone URLs
      - GITEA__server__SSH_PORT=222
    ports:
      - "3001:3000"
      - "222:22"

    volumes:
      - /opt/HomeLab/configs/GiteaStack/gitea:/data
      - /mnt/HDDStorage/DockerVolumes/GiteaStack/repositories:/data/git/repositories

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - gitea_net

  postgres:
    image: postgres:16
    container_name: gitea-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gitea

    volumes:
      - /opt/HomeLab/configs/GiteaStack/postgres:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U gitea -d gitea
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - gitea_net

networks:
  gitea_net:
    name: gitea_net
    driver: bridge